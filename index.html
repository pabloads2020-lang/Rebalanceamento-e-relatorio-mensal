<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBF · Rebalanceador + Relatório Mensal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Atkinson+Hyperlegible:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg: #0e1117; --bg2: #161b25; --bg3: #1c2333;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --gold: #f5c842; --gold2: #e0a800;
  --text: #e8eaf0; --text2: #8b93a7; --text3: #555e72;
  --green: #2ecc71; --green-bg: rgba(46,204,113,0.12);
  --red: #e74c3c; --red-bg: rgba(231,76,60,0.12);
  --amber: #f39c12; --amber-bg: rgba(243,156,18,0.12);
  --blue: #3498db; --blue-bg: rgba(52,152,219,0.12);
  --header-bg: #161b25; --header-border: rgba(255,255,255,0.07);
  --card-bg: #161b25; --card-border: rgba(255,255,255,0.07);
  --input-bg: #1c2333; --input-border: rgba(255,255,255,0.13);
  --alvo-bar-bg: #1c2333; --resumo-item-bg: #1c2333;
  --debug-bg: #1c2333; --overlay-bg: rgba(14,17,23,.88);
  --footer-border: rgba(255,255,255,0.07);
  --relatorio-bg: linear-gradient(135deg, rgba(245,200,66,0.03) 0%, rgba(52,152,219,0.03) 100%);
}
body.light {
  --bg: #f5f7fa; --bg2: #ffffff; --bg3: #f0f2f5;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.12);
  --gold: #d4a017; --gold2: #b8860b;
  --text: #1a1a2e; --text2: #4a5568; --text3: #718096;
  --green: #27ae60; --green-bg: rgba(39,174,96,0.1);
  --red: #e74c3c; --red-bg: rgba(231,76,60,0.1);
  --amber: #e67e22; --amber-bg: rgba(230,126,34,0.1);
  --blue: #3498db; --blue-bg: rgba(52,152,219,0.1);
  --header-bg: #ffffff; --header-border: rgba(0,0,0,0.08);
  --card-bg: #ffffff; --card-border: rgba(0,0,0,0.08);
  --input-bg: #ffffff; --input-border: #e2e8f0;
  --alvo-bar-bg: #e2e8f0; --resumo-item-bg: #f7fafc;
  --debug-bg: #f7fafc; --overlay-bg: rgba(255,255,255,.95);
  --footer-border: rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.2s ease; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.classe-input, .alvo-pct, .rec-nums, .rec-valor, .resumo-val, .patrim-tag, .header-date, .total-bar span:last-child { font-family: 'Atkinson Hyperlegible', monospace; font-weight: 600; letter-spacing: 0.5px; }
.header { background: var(--header-bg); border-bottom: 1px solid var(--header-border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }
.dot { width: 28px; height: 28px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #000; }
.header-date { font-size: 13px; color: var(--text3); }
.theme-toggle { background: var(--bg3); border: 1px solid var(--border2); border-radius: 30px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
.card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
.card-title { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.upload-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
.file-label { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1.5px dashed var(--border2); border-radius: 8px; padding: 9px 14px; cursor: pointer; font-size: 14px; color: var(--text2); flex: 1; }
#filePdf { display: none; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
.btn-gold { background: var(--gold); color: #000; }
.btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
.btn-full { background: var(--gold); color: #000; font-size: 15px; font-weight: 600; width: 100%; padding: 12px; justify-content: center; margin-top: 1rem; border-radius: 10px; }
.status { display: none; align-items: center; gap: 8px; padding: 9px 13px; border-radius: 8px; font-size: 14px; margin-top: 0.75rem; }
.status.show { display: flex; }
.status-ok { background: var(--green-bg); color: var(--green); }
.status-err { background: var(--red-bg); color: var(--red); }
.patrim-tag { display: none; margin-top: 0.6rem; background: rgba(245, 200, 66, 0.1); border: 1px solid rgba(245, 200, 66, 0.25); border-radius: 20px; padding: 6px 14px; font-size: 14px; color: var(--gold); width: fit-content; }
.patrim-tag.show { display: flex; }
.perfis-row { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.perfil-btn { flex: 1; padding: 10px; border-radius: 10px; font-size: 14px; cursor: pointer; border: 1px solid var(--border2); background: var(--bg2); color: var(--text2); }
.perfil-btn.ativo { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 600; }
.tab-bar { display: flex; gap: 1px; background: var(--border); border-radius: 10px; margin-bottom: 1.5rem; overflow: hidden; }
.tab-btn { flex: 1; padding: 12px; background: var(--bg2); border: none; color: var(--text2); cursor: pointer; font-weight: 600; }
.tab-btn.active { background: var(--gold); color: #000; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
@media (max-width: 700px) { .grid2 { grid-template-columns: 1fr; } }
.classe-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.dot8 { width: 8px; height: 8px; border-radius: 50%; }
.c0 { background: #f5c842; } .c1 { background: #3498db; } .c2 { background: #2ecc71; } .c3 { background: #9b59b6; } .c4 { background: #e74c3c; } .c5 { background: #1abc9c; } .c6 { background: #e67e22; } .c7 { background: #95a5a6; } .c8 { background: #f1c40f; } .c9 { background: #e84393; } .c10 { background: #00cec9; }
.classe-nome { flex: 1; font-size: 14px; }
.classe-input { width: 80px; padding: 8px 10px; text-align: right; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 7px; color: var(--text); }
.total-bar { display: flex; justify-content: space-between; padding: 8px 12px; border-radius: 8px; font-size: 14px; margin-top: 0.75rem; }
.total-ok { background: var(--green-bg); color: var(--green); }
.total-err { background: var(--red-bg); color: var(--red); }
.alvo-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.alvo-nome { flex: 1; font-size: 14px; }
.alvo-bar-wrap { width: 60px; height: 4px; background: var(--alvo-bar-bg); border-radius: 2px; }
.alvo-bar-fill { height: 100%; background: var(--gold); }
.alvo-pct { font-size: 15px; font-weight: 700; color: var(--gold); min-width: 42px; text-align: right; }
.rec-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.rec-nome { flex: 1; font-size: 14px; }
.rec-valor { font-size: 15px; font-weight: 700; }
.rec-valor.alocar { color: var(--green); }
.rec-valor.retirar { color: var(--red); }
.badge { padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.b-manter { background: var(--amber-bg); color: var(--amber); }
.b-alocar { background: var(--green-bg); color: var(--green); }
.b-retirar { background: var(--red-bg); color: var(--red); }
.debug-box { display: none; background: var(--debug-bg); padding: 0.75rem; font-size: 11px; margin-top: 10px; border-radius: 8px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
.debug-box.show { display: block; }
.overlay { display: none; position: fixed; inset: 0; background: var(--overlay-bg); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
.overlay.show { display: flex; }
.spin { width: 30px; height: 30px; border: 3px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: rot 0.8s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }
.cenario-textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 12px; color: var(--text); font-size: 14px; margin-top: 0.5rem; resize: vertical; }
.relatorio-container { background: var(--relatorio-bg); border-radius: 12px; padding: 1.5rem; min-height: 100px; }
.relatorio-texto { font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
</style>
</head>
<body>

<div class="overlay" id="overlay"><div class="spin"></div><div>Processando PDF...</div></div>

<header class="header">
  <div class="header-logo"><div class="dot">PBF</div>Rebalanceador + Relatório Mensal</div>
  <div class="header-right" style="display:flex; align-items:center; gap:15px;">
    <div class="header-date" id="hDate"></div>
    <button class="theme-toggle" id="themeToggle">🌙</button>
  </div>
</header>

<main class="main">
  <div class="card">
    <div class="card-title">Importar relatório XP (PDF)</div>
    <div class="upload-row">
      <label class="file-label" for="filePdf"><span id="fileName">Selecionar PDF...</span></label>
      <input type="file" id="filePdf" accept=".pdf">
      <button class="btn btn-gold" id="btnImportar">Importar PDF</button>
      <button class="btn btn-ghost" id="btnLimpar">Limpar</button>
    </div>
    <div id="status" class="status"></div>
    <div id="patrimTag" class="patrim-tag"><span id="patrimVal"></span></div>
    <button class="btn btn-ghost" style="font-size:10px; margin-top:10px; padding:4px 8px;" onclick="document.getElementById('debugBox').classList.toggle('show')">Exibir Logs de Leitura</button>
    <div id="debugBox" class="debug-box"></div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="tab-rebalanceamento">⚖️ Rebalanceamento</button>
    <button class="tab-btn" data-tab="tab-relatorio">📊 Relatório Mensal</button>
  </div>

  <div id="tab-rebalanceamento" class="tab-content active">
    <div class="perfis-row" id="perfisRow"></div>
    <div class="grid2">
      <div class="card">
        <div class="card-title">Alocação atual</div>
        <div id="inputsAtual"></div>
        <div id="totalBar" class="total-bar total-err"><span>Total</span><span id="totalVal">0,00%</span></div>
      </div>
      <div class="card">
        <div class="card-title">Carteira recomendada · <span id="perfilLabel" style="color:var(--gold)">Moderado</span></div>
        <div id="tabelaAlvo"></div>
        <button class="btn btn-full" id="btnAnalisar">Analisar rebalanceamento</button>
      </div>
    </div>
    <div id="resultArea" class="card" style="display:none">
      <div class="card-title">Recomendações</div>
      <div id="listaRec"></div>
    </div>
  </div>

  <div id="tab-relatorio" class="tab-content">
    <div class="card">
      <div class="card-title">📝 Cenário Macro</div>
      <textarea id="textoCenario" class="cenario-textarea" rows="4">O mês de abril de 2026 foi marcado por uma consolidação das expectativas econômicas globais e locais. No Brasil, o foco permaneceu na trajetória da inflação e no compromisso fiscal. No cenário global, a resiliência da economia norte-americana continua ditando o ritmo dos mercados.</textarea>
    </div>
    <div class="card">
      <div class="card-title">📈 Relatório Gerado</div>
      <div id="relatorioConteudo" class="relatorio-container">
        <div style="text-align:center; color:var(--text3); padding:2rem;">Importe o PDF para gerar</div>
      </div>
      <button class="btn btn-gold" id="btnCopiar" style="margin-top:1rem;">📋 Copiar Texto</button>
    </div>
  </div>
</main>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let patrimonioTotal = 0;
let dadosRelatorio = null;
const PERFIS = {
  Conservador: { "Renda Fixa Pós": 85, "Renda Fixa Pré": 15, "Renda Fixa Inflação": 0, "Multiestratégia": 0, "Renda Variável": 0, "Renda Fixa Global": 0, "Renda Variável Global": 0, "Alternativo": 0 },
  Moderado: { "Renda Fixa Pós": 58, "Renda Fixa Pré": 13, "Renda Fixa Inflação": 20, "Multiestratégia": 5, "Renda Variável": 4, "Renda Fixa Global": 0, "Renda Variável Global": 0, "Alternativo": 0 },
  Agressivo: { "Renda Fixa Pós": 50, "Renda Fixa Pré": 15, "Renda Fixa Inflação": 24, "Multiestratégia": 5, "Renda Variável": 6, "Renda Fixa Global": 0, "Renda Variável Global": 0, "Alternativo": 0 }
};
const CLASSES = ["Renda Fixa Pós", "Renda Fixa Pré", "Renda Fixa Inflação", "Multiestratégia", "Renda Variável", "Renda Fixa Global", "Renda Variável Global", "Alternativo", "Caixa", "Proventos", "Fundos Listados"];
const CORES = ["c0","c1","c2","c3","c4","c5","c6","c7","c8","c9","c10"];
let perfilAtivo = "Moderado";
let inputsMap = {};

function fmtPct(v) { return v.toFixed(2).replace('.', ',') + ' %'; }
function fmtBRL(v) { return 'R$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits: 2}); }

function atualizarTotal() {
  let t = 0;
  CLASSES.forEach(c => { t += parseFloat(inputsMap[c]?.value || 0) || 0; });
  document.getElementById('totalVal').textContent = fmtPct(t);
  document.getElementById('totalBar').className = 'total-bar ' + (Math.abs(t - 100) < 0.1 ? 'total-ok' : 'total-err');
}

async function extrairDadosPDF(file) {
  const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
  let textoCompleto = '';
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const tc = await page.getTextContent();
    textoCompleto += tc.items.map(item => item.str).join(' ') + ' ';
  }
  const limpo = textoCompleto.replace(/\s+/g, '');

  // LIMPAR ANTES DE NOVO IMPORT (Evita erro de 170%)
  CLASSES.forEach(c => { inputsMap[c].value = 0; });

  function buscarPct(nome) {
    const n = nome.replace(/\s+/g, '');
    const regex = new RegExp(n + '.*?\\((\\d{1,3})\\s*,\\s*(\\d{2})\\s*%\\)', 'i');
    const m = limpo.match(regex);
    if (m) return parseFloat(m[1] + '.' + m[2]);
    return null;
  }

  const resRebal = {};
  CLASSES.forEach(c => {
    let chave = c.replace('Renda Fixa ', '').replace('Brasil', '').replace('Global', '').replace(' ', '');
    if (c === "Multiestratégia") chave = "Multimercado";
    resRebal[c] = buscarPct(chave);
  });

  let pat = 0;
  const pm = limpo.match(/PATRIM[OÔ]NIOTOTALBRUTO:.*?R\$([\d\.]+,\d{2})/i);
  if (pm) pat = parseFloat(pm[1].replace(/\./g, '').replace(',', '.'));

  let dr = { alocacoes: {}, retornos: {}, patrimonio: pat, rentabilidadeMensal: 0, pctCdi: 0, mesRef: "Abril", anoRef: "2026" };
  
  // CAPTURA DO CDI (AJUSTE SOLICITADO)
  const rm = limpo.match(/RENTABILIDADEMÊS:([\d,]+)%/i);
  if (rm) dr.rentabilidadeMensal = parseFloat(rm[1].replace(',', '.'));
  
  // Regex específica para pegar o % do CDI que vem logo após
  const cm = limpo.match(/MÊSR\$[\d\.,]+[\d,]+%([\d,]+)%/i);
  if (cm) dr.pctCdi = parseFloat(cm[1].replace(',', '.'));

  const mapping = { 'PósFixado': 'Pós-Fixado', 'PréFixado': 'Pré-Fixado', 'Inflação': 'Inflação', 'RendaVariávelBrasil': 'Renda Variável', 'Multimercado': 'Multiestratégia', 'FundosListados': 'Fundos Listados' };
  Object.keys(mapping).forEach(k => {
    const reg = new RegExp(k + '\\((\\d+,\\d+)%\\)R\\$[\\d\\.]+,\\d+(-?\\d+,\\d+)%', 'i');
    const m = limpo.match(reg);
    if (m) { dr.alocacoes[mapping[k]] = m[1]; dr.retornos[mapping[k]] = m[2]; }
  });

  return { resRebal, pat, dr };
}

function analisar() {
  let total = 0;
  const atual = {};
  CLASSES.forEach(c => { atual[c] = parseFloat(inputsMap[c]?.value || 0) || 0; total += atual[c]; });
  
  const alvo = PERFIS[perfilAtivo];
  const classesAnalise = CLASSES.filter(c => c !== 'Caixa' && c !== 'Proventos' && c !== 'Fundos Listados');
  
  const html = classesAnalise.map(c => {
    const diff = alvo[c] - atual[c];
    const valor = Math.abs(diff * patrimonioTotal / 100);
    const badge = Math.abs(diff) < 0.05 ? 'b-manter' : (diff > 0 ? 'b-alocar' : 'b-retirar');
    const label = Math.abs(diff) < 0.05 ? '✓ Manter' : (diff > 0 ? `↑ Alocar +${fmtPct(diff)}` : `↓ Retirar ${fmtPct(Math.abs(diff))}`);
    return `<div class="rec-row"><div class="dot8 ${CORES[CLASSES.indexOf(c)]}"></div><span class="rec-nome">${c}</span><span class="rec-valor ${badge.split('-')[1]}">${Math.abs(diff) < 0.05 ? 'R$ 0,00' : fmtBRL(valor)}</span><span class="badge ${badge}">${label}</span></div>`;
  }).join('');
  
  const area = document.getElementById('resultArea');
  document.getElementById('listaRec').innerHTML = html;
  area.style.display = 'block';
  area.scrollIntoView({ behavior: 'smooth' }); // SCROLL RESTAURADO
}

function gerarTexto(d) {
  let resumo = "";
  Object.keys(d.alocacoes).forEach(n => {
    const acao = parseFloat(d.retornos[n].replace(',', '.')) >= 0 ? "subiu" : "recuou";
    resumo += `• A estratégia ${n} (${d.alocacoes[n]}% da carteira) ${acao} ${d.retornos[n]}% no mês;\n`;
  });
  return `Prezado Cliente, tudo bem? Segue o seu relatório mensal.

${document.getElementById('textoCenario').value}

Sua carteira apresentou um retorno de ${d.rentabilidadeMensal.toFixed(2).replace('.', ',')}% no mês de ${d.mesRef} de ${d.anoRef}, equivalente a ${d.pctCdi.toFixed(2).replace('.', ',')}% do CDI. O patrimônio atual é de ${fmtBRL(d.patrimonio)}.

No desempenho por estratégias:
${resumo}
Por fim, reforçamos a importância da disciplina na manutenção da estratégia focando no desenvolvimento da carteira no longo prazo.

Atenciosamente,
Equipe PBF Investimentos`;
}

document.getElementById('btnImportar').addEventListener('click', async () => {
  const file = document.getElementById('filePdf').files[0];
  if (!file) return;
  document.getElementById('overlay').classList.add('show');
  try {
    const dados = await extrairDadosPDF(file);
    patrimonioTotal = dados.pat;
    dadosRelatorio = dados.dr;
    CLASSES.forEach((c, i) => { if (dados.resRebal[c] !== null) inputsMap[c].value = dados.resRebal[c]; });
    atualizarTotal();
    document.getElementById('patrimVal').textContent = fmtBRL(patrimonioTotal);
    document.getElementById('patrimTag').classList.add('show');
    document.getElementById('relatorioConteudo').innerHTML = `<div class="relatorio-texto" id="relTextoFinal">${gerarTexto(dadosRelatorio)}</div>`;
  } catch (e) { console.error(e); }
  finally { document.getElementById('overlay').classList.remove('show'); }
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

document.getElementById('btnCopiar').addEventListener('click', () => {
  const t = document.getElementById('relTextoFinal')?.innerText;
  if(t) { navigator.clipboard.writeText(t); alert('Copiado!'); }
});

document.getElementById('btnLimpar').addEventListener('click', () => {
  document.getElementById('filePdf').value = '';
  CLASSES.forEach(c => { inputsMap[c].value = 0; });
  atualizarTotal();
  document.getElementById('patrimTag').classList.remove('show');
});

document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.classList.toggle('light');
  document.getElementById('themeToggle').textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
});

document.getElementById('btnAnalisar').addEventListener('click', analisar);

(function init() {
  const d = new Date();
  const meses = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
  document.getElementById('hDate').textContent = `${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
  
  const container = document.getElementById('inputsAtual');
  CLASSES.forEach((c, idx) => {
    const row = document.createElement('div');
    row.className = 'classe-row';
    row.innerHTML = `<div class="dot8 ${CORES[idx]}"></div><span class="classe-nome">${c}</span><input class="classe-input" type="number" step="any" value="0" id="inp_${idx}"><span style="margin-left:5px; font-size:12px; color:var(--text3)">%</span>`;
    container.appendChild(row);
    inputsMap[c] = row.querySelector('input');
    inputsMap[c].addEventListener('input', atualizarTotal);
  });

  const pRow = document.getElementById('perfisRow');
  Object.keys(PERFIS).forEach(p => {
    const b = document.createElement('button');
    b.className = 'perfil-btn ' + (p === perfilAtivo ? 'ativo' : '');
    b.textContent = p;
    b.onclick = () => { perfilAtivo = p; document.querySelectorAll('.perfil-btn').forEach(x => x.classList.remove('ativo')); b.classList.add('ativo'); document.getElementById('perfilLabel').textContent = p; renderAlvo(); };
    pRow.appendChild(b);
  });
  renderAlvo();
})();

function renderAlvo() {
  const rec = PERFIS[perfilAtivo];
  const classesAlvo = CLASSES.filter(c => c !== 'Caixa' && c !== 'Proventos' && c !== 'Fundos Listados');
  document.getElementById('tabelaAlvo').innerHTML = classesAlvo.map(c => `<div class="alvo-row"><div class="dot8 ${CORES[CLASSES.indexOf(c)]}"></div><span class="alvo-nome">${c}</span><div class="alvo-bar-wrap"><div class="alvo-bar-fill" style="width:${rec[c]}%"></div></div><span class="alvo-pct">${rec[c]}%</span></div>`).join('');
}
</script>
</body>
</html>
